# ── Credit Risk Domain Configuration ─────────────────────────────────────────
# Dataset: UCI Default of Credit Card Clients
# Source: https://archive.ics.uci.edu/dataset/350/default+of+credit+card+clients
# Records: 30,000 | Positive class: ~22% (default=1)
# Features: Credit limit, demographics, repayment history, bill amounts, payments

domain: credit_risk
description: "Predict probability of credit card default next month (binary classification)"

# ── Data ──────────────────────────────────────────────────────────────────────
data:
  raw_path: "data/raw/credit_risk/credit_risk.csv"
  processed_train_path: "data/processed/credit_risk/train.parquet"
  processed_test_path: "data/processed/credit_risk/test.parquet"
  target_column: "default"
  test_size: 0.2
  random_state: 42

# ── Features ─────────────────────────────────────────────────────────────────
features:
  # All numeric (ordinal-encoded categoricals treated as numeric for XGBoost)
  # XGBoost handles ordinal integers well without one-hot encoding.
  numeric_features:
    - LIMIT_BAL      # Credit limit amount (NT dollar)
    - SEX            # 1=male, 2=female
    - EDUCATION      # 1=grad school, 2=university, 3=high school, 4=other
    - MARRIAGE       # 1=married, 2=single, 3=other
    - AGE            # Age in years
    - PAY_0          # Repayment status Sep 2005 (-2=no consumption, -1=pay duly, 1-9=delay months)
    - PAY_2          # Repayment status Aug 2005
    - PAY_3          # Repayment status Jul 2005
    - PAY_4          # Repayment status Jun 2005
    - PAY_5          # Repayment status May 2005
    - PAY_6          # Repayment status Apr 2005
    - BILL_AMT1      # Bill statement Sep 2005 (NT dollar)
    - BILL_AMT2      # Bill statement Aug 2005
    - BILL_AMT3      # Bill statement Jul 2005
    - BILL_AMT4      # Bill statement Jun 2005
    - BILL_AMT5      # Bill statement May 2005
    - BILL_AMT6      # Bill statement Apr 2005
    - PAY_AMT1       # Previous payment Sep 2005 (NT dollar)
    - PAY_AMT2       # Previous payment Aug 2005
    - PAY_AMT3       # Previous payment Jul 2005
    - PAY_AMT4       # Previous payment Jun 2005
    - PAY_AMT5       # Previous payment May 2005
    - PAY_AMT6       # Previous payment Apr 2005

  categorical_features: []  # No separate categorical handling needed — XGBoost handles ordinals

  drop_columns:
    - ID             # Customer identifier — not a predictive feature

  imputation:
    strategy: median # No missing values in this dataset but defensive default

  outlier_clip_percentile: 99

# ── Model ─────────────────────────────────────────────────────────────────────
model:
  baseline:
    type: logistic_regression
    params:
      max_iter: 1000
      class_weight: balanced
      random_state: 42

  primary:
    type: xgboost
    params:
      n_estimators: 300
      max_depth: 6
      learning_rate: 0.05
      subsample: 0.8
      colsample_bytree: 0.8
      scale_pos_weight: 3.5   # ~23364/6636 ≈ 3.5 (negatives/positives)
      random_state: 42
      eval_metric: auc
      early_stopping_rounds: 20

# ── Hyperparameter Tuning ─────────────────────────────────────────────────────
tuning:
  n_trials: 50
  direction: maximize
  metric: roc_auc
  cv_folds: 5
  search_space:
    n_estimators: [100, 500]
    max_depth: [3, 9]
    learning_rate: [0.01, 0.3]
    subsample: [0.6, 1.0]
    colsample_bytree: [0.6, 1.0]
    min_child_weight: [1, 10]

# ── Evaluation ────────────────────────────────────────────────────────────────
evaluation:
  metrics:
    - accuracy
    - precision
    - recall
    - f1
    - roc_auc
  threshold_range: [0.1, 0.9]
  threshold_step: 0.05
  positive_class_label: "Default"
  negative_class_label: "No Default"

# ── MLflow ────────────────────────────────────────────────────────────────────
mlflow:
  experiment_name: "credit_risk_prediction"
  model_name: "credit_risk_xgboost"
  tracking_uri: "mlruns"

# ── SHAP ──────────────────────────────────────────────────────────────────────
shap:
  max_display_features: 15
  sample_size: 1000
