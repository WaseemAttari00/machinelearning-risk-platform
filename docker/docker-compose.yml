# Services:
#   api       — FastAPI inference server (port 8000)
#   frontend  — Streamlit dashboard (port 8501)
#   mlflow    — MLflow tracking UI (port 5000)
#
# Usage:
#   docker-compose up --build        # build images and start all services
#   docker-compose up api            # start only the API
#   docker-compose down              # stop all services
#   docker-compose logs -f api       # stream API logs

version: "3.9"

services:

  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    container_name: risk_api
    ports:
      - "8000:8000"
    volumes:
      - ../models:/app/models
      - ../mlruns:/app/mlruns
      - ../configs:/app/configs
    environment:
      - PYTHONPATH=/app
      - MLFLOW_TRACKING_URI=/app/mlruns
    networks:
      - risk_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
    container_name: risk_frontend
    ports:
      - "8501:8501"
    volumes:
      - ../models:/app/models
    environment:
      # "api" resolves to the API container via the shared Docker network
      - API_URL=http://api:8000
      - PYTHONPATH=/app
    depends_on:
      api:
        condition: service_healthy
    networks:
      - risk_network
    restart: unless-stopped

  mlflow:
    image: python:3.11-slim
    container_name: risk_mlflow
    command: >
      sh -c "pip install mlflow --quiet &&
             mlflow ui --host 0.0.0.0 --port 5000 --backend-store-uri /mlruns"
    ports:
      - "5000:5000"
    volumes:
      - ../mlruns:/mlruns
    networks:
      - risk_network
    restart: unless-stopped

networks:
  risk_network:
    driver: bridge
